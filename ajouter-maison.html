<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SUNU HABITAT - Ajouter une Maison</title>
    <link rel="stylesheet" href="dashboard.css">
    <link rel="shortcut icon" href="./Images/S.png" type="image/x-icon" />
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet" />
    <style>
        .form-card {
            background: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
            max-width: 800px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #444;
        }
        .form-group input, .form-group textarea, .form-group select {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 15px;
            font-family: 'Poppins', sans-serif;
            transition: 0.3s;
        }
        .form-group input:focus, .form-group textarea:focus {
            border-color: #00bf63;
            outline: none;
            box-shadow: 0 0 0 3px rgba(0, 191, 99, 0.1);
        }
        .form-group textarea {
            resize: vertical;
            height: 120px;
        }
        .btn-submit {
            background: #00bf63;
            color: #fff;
            padding: 14px 25px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.3s;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }
        .btn-submit:hover {
            background: #00a053;
        }
    </style>
</head>
<body>
    <div class="dashboard-layout">
        <!-- SIDEBAR -->
        <aside class="sidebar">
            <div class="sidebar-logo">
                <img src="./Images/S.png" alt="Logo">
                <h2>Espace Pro</h2>
            </div>
            <ul class="sidebar-menu">
                <li><a href="dashboard.html"><i class='bx bx-grid-alt'></i> Vue d'ensemble</a></li>
                <li><a href="#"><i class='bx bx-building-house'></i> Mes Maisons</a></li>
                <li><a href="ajouter-maison.html" class="active"><i class='bx bx-plus-circle'></i> Ajouter une annonce</a></li>
                <li><a href="#"><i class='bx bx-message-square-detail'></i> Demandes clients</a></li>
                <li><a href="index.html"><i class='bx bx-world'></i> Retour au site</a></li>
            </ul>
            <div class="sidebar-bottom">
                <a href="#" id="btn-logout"><i class='bx bx-log-out'></i> Déconnexion</a>
            </div>
        </aside>

        <!-- MAIN CONTENT -->
        <main class="main-content">
            <header class="topbar">
                <div class="title" style="display:flex; align-items:center; gap:15px;">
                    <i class='bx bx-menu' id="dashboard-burger" style="font-size: 32px; cursor:pointer; display:none; color: #00bf63;"></i>
                    <div>
                        <h1>Publier une Annonce</h1>
                        <p>Ajoutez une nouvelle maison à louer ou à vendre</p>
                    </div>
                </div>
                <div class="user-profile">
                    <img src="./Images/client-1.jpg" alt="Profile">
                    <span id="user-name">Chargement...</span>
                </div>
            </header>

            <section class="form-section">
                <div class="form-card">
                    <form id="form-ajouter-maison">
                        <div class="form-group">
                            <label>Titre de l'annonce</label>
                            <input type="text" id="titre" placeholder="Ex: Belle Villa Contemporaine R+1" required>
                        </div>
                        
                        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px;">
                            <div class="form-group">
                                <label>Localisation</label>
                                <input type="text" id="localisation" placeholder="Ex: Almadies, Dakar" required>
                            </div>
                            <div class="form-group">
                                <label>Prix (FCFA / mois)</label>
                                <input type="number" id="prix" placeholder="Ex: 500000" required>
                            </div>
                        </div>

                        <div class="form-group">
                            <label>Description détaillée</label>
                            <textarea id="description" placeholder="Décrivez les atouts de la maison (nombre de chambres, jardin, piscine, sécurité...)" required></textarea>
                        </div>

                        <div class="form-group">
                            <label>Photo principale</label>
                            <input type="file" id="image" accept="image/*" required style="padding: 9px 15px; background: #f9f9f9; cursor: pointer;">
                        </div>

                        <button type="submit" class="btn-submit">
                            <i class='bx bx-check-circle'></i> Publier l'Annonce
                        </button>
                    </form>
                </div>
            </section>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script type="module" src="firebase-config.js"></script>
    <script type="module" src="ajouter-maison.js"></script>
</body>
</html>
