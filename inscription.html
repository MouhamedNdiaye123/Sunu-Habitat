<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SUNU HABITAT</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="shortcut icon" href="./Images/S.png" type="image/x-icon" />
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet" />
    
  </head>

  <body>
    <!-- NAVBAR SECTION -->
    <nav class="nav-connecte">
      <a href="index.html" class="logo">
        <img src="./Images/S.png" alt="images logo" />
      </a>
    </nav>

    <!-- INSCRIPTION SECTION -->

    <section class="connexion-section" id="connexion">
      <div class="section-heading">
        <h2>créer un compte</h2>
      </div>
      <div class="connexion">
        <form action="">
          <label for="">Entrez votre nom complet</label>
          <input type="text" name="" id="" placeholder="Votre nom complet">
          <label for="">Entrez votre numéro</label>
          <input type="tel" name="" id="" placeholder="Votre numéro">
          <label for="">Selectionner une option</label>
          <select name="Selection" id="Selection">
            <option value="selectionner"></option>
            <option value="client">Client</option>
            <option value="propriete">Proprietaire</option>
          </select>
          <label for="">Entrez votre email</label>
          <input type="email" name="" id="" placeholder="Votre email">
          <label for="">Mot de passe</label>
          <input type="password" name="" id="" placeholder="Votre mot de passe">
          <label for="">Confirmer le mot de passe</label>
          <input type="password" name="" id="" placeholder="Confirmer votre mot de passe">
          <button type="submit">S'inscrire</button>
          <p>Vous avez déjà un compte ? <a href="connexion.html">Se connecter</a></p>
        </form>
      </div>
    </section>



    <script src="script.js"></script>
  </body>
</html>
