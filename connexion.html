<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SUNU HABITAT</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="shortcut icon" href="./Images/S.png" type="image/x-icon" />
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet" />
    
  </head>

  <body>
    <!-- NAVBAR SECTION -->
    <nav>
      <a href="index.html" class="logo">
        <img src="./Images/S.png" alt="images logo" />
      </a>
      <ul class="navigation" id="navigation">
        <li><a href="#">Accueil</a></li>
        <li><a href="#maison">Nos maisons</a></li>
        <li><a href="#about">A propos</a></li>
        <li><a href="#contact">Contact</a></li>
        <li><a href="#">Connexion</a></li>
      </ul>
      <i class='bx bx-menu-alt-right' id="menu-burger"></i>
    </nav>


    <!-- CONTACT SECTION -->

    <section class="contact" id="contact">
      <div class="section-heading">
        <h2>nous <span>contacter</span></h2>
        <p>
          Vous avez une question ou besoin d’assistance ? <br />
          Notre équipe est à votre disposition.
        </p>
      </div>
      <div class="contact-container">
        <div class="contact-img">
          <img src="./Images/img-9.jpg" alt="">
        </div>
        <form action="">
          <div class="form-groupe">
            <div>
              <label for="">Prenom</label>
              <input type="text" name="" id="" placeholder="Votre prenom">
            </div>
            <div>
              <label for="">Nom</label>
              <input type="text" name="" id="" placeholder="Votre nom">
            </div>
          </div>
          <label for="">Telephone</label>
          <input type="text" name="" id="" placeholder="Votre tel">
          <label for="">Message</label>
          <textarea name="" id="" placeholder="Votre message"></textarea>
          <button type="submit">Envoyer</button>
        </form>
      </div>
    </section>



    <script src="script.js"></script>
  </body>
</html>
